replicaCount: 3

image:
  repository: ghcr.io/devops-takehome/quote-api
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: traefik
  host: quote-api.localhost
  path: /

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  minAvailable: 2

nodePlacement:
  spotWeight: 100

serviceAccount:
  create: true
  name: ""
